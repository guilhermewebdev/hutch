# hutch-managed
# LiteLLM Cache enhancement
#
# Adds Redis to enable:
# - Response caching (skips API calls for repeat questions)
# - Performance boost and token savings
#
# To use: add SERVICES="litellm litellm-cache" to your profile.

services:
  litellm-cache:
    image: redis:alpine
    labels:
      hutch.service: "litellm-cache"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    environment:
      - REDIS_HOST=litellm-cache
      - REDIS_PORT=6379
    depends_on:
      litellm-cache:
        condition: service_healthy
