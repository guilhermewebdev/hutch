# hutch-managed
# LiteLLM Database enhancement
#
# Adds PostgreSQL to enable:
# - Admin UI (Dashboard) at http://litellm:4000/
# - Usage tracking and cost analysis
# - Virtual Keys (sk-...)
#
# To use: add SERVICES="litellm litellm-db" to your profile.

services:
  litellm-db:
    image: postgres:16-alpine
    labels:
      hutch.service: "litellm-db"
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    environment:
      - DATABASE_URL=postgresql://litellm:litellm_password@litellm-db:5432/litellm
      - LITELLM_MASTER_KEY=sk-hutch-master-key # Default master key for the UI
    depends_on:
      litellm-db:
        condition: service_healthy

volumes:
  postgres_data:
    name: "${HUTCH_PROFILE}_postgres_data"
