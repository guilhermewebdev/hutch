# hutch-managed
# LiteLLM proxy service
#
# OpenAI-compatible proxy that routes requests across multiple providers.
# Config lives in ~/.litellm.yaml inside the profile volume.

services:
  litellm:
    build:
      context: "${HUTCH_IMAGES_DIR}"
      dockerfile: "litellm/Dockerfile"
    image: "hutch-litellm:latest"
    labels:
      hutch.service: "litellm"
    environment:
      - HUTCH_USER
      - HUTCH_UID
      - HUTCH_GID
      - HUTCH_DOCKER_GID
      - HUTCH_WORKSPACE
      - DEEPSEEK_API_KEY
      - GOOGLE_API_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
    volumes:
      - profile_home:/home/user
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/liveliness || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  main:
    environment:
      # Standard OpenAI variables
      - OPENAI_BASE_URL=http://litellm:4000/v1
      - OPENAI_API_BASE=http://litellm:4000/v1
      - OPENAI_API_KEY=litellm

      # OpenHands specific
      - LLM_BASE_URL=http://litellm:4000/v1
      - LLM_API_KEY=litellm
      - LLM_MODEL=openai/strong # Maps to the 'strong' model in ~/.litellm.yaml

      # LiteLLM specific
      - LITELLM_PROXY_BASE_URL=http://litellm:4000/v1
    depends_on:
      - litellm

volumes:
  profile_home:
    name: "${HUTCH_PROFILE}_home"
