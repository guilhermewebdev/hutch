# hutch-managed
# File System MCP service
#
# Serves files from ~/HutchMCP/<profile>/ on the host as MCP resources
# over HTTP/SSE. AI clients connect to http://mcp-files:3000/sse.
#
# To use: add SERVICES="mcp-files" to your profile, then:
#   hutch build mcp-files
#   mkdir -p ~/HutchMCP/<profile>   # place files here
#
# Configure AI clients (inside the container):
#   claude mcp add --transport sse hutch-files http://mcp-files:3000/sse

services:
  mcp-files:
    build:
      context: "${HUTCH_IMAGES_DIR}"
      dockerfile: "mcp-files/Dockerfile"
    image: "hutch-mcp-files:latest"
    labels:
      hutch.service: "mcp-files"
    volumes:
      - "${HUTCH_MCP_DIR}:/hutch-mcp:ro"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/3000"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  main:
    environment:
      - MCP_FILES_URL=http://mcp-files:3000/sse
    depends_on:
      mcp-files:
        condition: service_healthy
