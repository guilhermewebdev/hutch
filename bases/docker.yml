# Docker socket base
#
# Mounts the host Docker socket inside the container, giving full Docker CLI
# access (docker, docker compose, etc.) without a separate daemon.
#
# WARNING: any process in the container — including AI agents — can use this
# socket to run privileged containers with full access to the host filesystem.
# Use only in trusted contexts where Docker access is explicitly required.
#
# To use: set BASE="docker" in your profile.

services:
  main:
    build:
      context: "${HUTCH_IMAGES_DIR}/${HUTCH_BUILD}"
    image: "${HUTCH_IMAGE}"
    stdin_open: true
    tty: true
    hostname: "${HUTCH_PROFILE}"
    labels:
      hutch.profile: "${HUTCH_PROFILE}"
    environment:
      - HUTCH_USER
      - HUTCH_UID
      - HUTCH_GID
      - HUTCH_DOCKER_GID
      - HUTCH_WORKSPACE
      - TERM
      - COLORTERM
    volumes:
      - profile_home:/home/user
      - "${HUTCH_WORKSPACE}:${HUTCH_WORKSPACE}"
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: "${HUTCH_WORKSPACE}"

volumes:
  profile_home:
    name: "${HUTCH_PROFILE}_home"
